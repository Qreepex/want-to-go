apiVersion: v1
kind: Namespace
metadata:
  name: want-to-go
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: want-to-go
data:
  NODE_ENV: "production"
  PORT: "3001"
  # Must match wherever the frontend (Cloudflare Worker) is actually served from.
  FRONTEND_URL: "https://go.schiemann.work"
  AWS_REGION: "eu-central-3"
  S3_ENDPOINT: "https://s3.eu-central-3.ionoscloud.com"
  S3_BUCKET_NAME: "want-to-go"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: want-to-go
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Built from backend/Dockerfile (context: repo root). Replace with your
          # registry/tag before applying, e.g. via CI on each release.
          image: ghcr.io/qreepex/want-to-go-backend:latest
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: want-to-go
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: want-to-go
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    # Uploads are capped at 1MB/file server-side (backend/src/routes/uploads.ts);
    # this leaves headroom for multipart overhead on multi-file requests.
    nginx.ingress.kubernetes.io/proxy-body-size: 8m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - go-api.schiemann.work
      secretName: backend-tls
  rules:
    - host: go-api.schiemann.work
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
